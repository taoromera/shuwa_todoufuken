<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a365d" />
    <meta name="robots" content="noindex, nofollow" />
    <title>レッスン単語管理</title>
    <script type="module" crossorigin src="./assets/manage-DClxuDLm.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/videos-YbpVmgOD.js">
    <link rel="stylesheet" crossorigin href="./assets/videos-2_M7uRJb.css">
    <link rel="stylesheet" crossorigin href="./assets/manage-10Tv5-gr.css">
  </head>
  <body>
    <div id="app" class="manage-app">
      <header class="header">
        <h1>レッスン単語管理</h1>
        <p class="subtitle">レッスンに含める単語の追加・削除</p>
      </header>

      <div class="lesson-picker">
        <label class="lesson-picker-label" for="lesson-select">レッスン</label>
        <select class="lesson-select" id="lesson-select" aria-label="レッスン"></select>
      </div>

      <p class="manage-status" id="status" role="status" aria-live="polite"></p>

      <section class="manage-card" aria-labelledby="word-list-heading">
        <div class="manage-card-header">
          <h2 class="manage-card-title" id="word-list-heading">登録済みの単語</h2>
          <span class="manage-count" id="word-count"></span>
        </div>
        <ul class="word-list" id="word-list"></ul>
        <p class="empty-message" id="empty-message" hidden>このレッスンにはまだ単語がありません。</p>
      </section>

      <section class="manage-card" aria-labelledby="add-word-heading">
        <h2 class="manage-card-title" id="add-word-heading">単語を追加</h2>

        <div class="video-field">
          <label class="field-label" for="video-input">元の動画</label>
          <input class="file-input" id="video-input" type="file" accept="video/*" />
          <p class="field-help">
            追加時に指定範囲を切り抜き、繰り返し1回分を videos フォルダに保存します。
          </p>
        </div>

        <form class="search-form" id="search-form">
          <label class="field-label" for="search-input">NHK手話辞書で検索</label>
          <div class="search-row">
            <input
              class="text-input"
              id="search-input"
              type="search"
              placeholder="例: 北海道"
              autocomplete="off"
            />
            <button class="btn btn-search" type="submit">検索</button>
          </div>
        </form>

        <ul class="search-results" id="search-results" hidden></ul>

        <details class="manual-entry">
          <summary>手動で入力する</summary>
          <form class="manual-form" id="manual-form">
            <label class="field-label" for="manual-title">言葉</label>
            <input class="text-input" id="manual-title" required />

            <label class="field-label" for="manual-caption">よみ（ひらがな）</label>
            <input class="text-input" id="manual-caption" required />

            <label class="field-label" for="manual-subdir">フォルダ</label>
            <select class="text-input" id="manual-subdir" required>
              <option value="common">common</option>
              <option value="area">area</option>
              <option value="jp">jp</option>
              <option value="eng">eng</option>
              <option value="num">num</option>
            </select>

            <label class="field-label" for="manual-code">コード（6桁）</label>
            <input class="text-input" id="manual-code" pattern="\d{6}" required />

            <button class="btn btn-add" type="submit">追加</button>
          </form>
        </details>
      </section>

      <footer class="manage-actions">
        <button class="btn btn-export" type="button" id="export-btn">words.js をダウンロード</button>
        <button class="btn btn-reset" type="button" id="reset-btn">初期データに戻す</button>
      </footer>
    </div>

  </body>
</html>
